version: "2.0"

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - .env
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
